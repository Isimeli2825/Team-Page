# Team Page route.
# Provides the public /team page accessible to authenticated and anonymous users
# with the 'access content' permission.
team_page.team:
  path: '/team'
  defaults:
    _controller: '\Drupal\team_page\Controller\TeamPageController::build'
    _title: 'Our Team'
  requirements:
    _permission: 'access content'
  options:
    no_cache: FALSE
    parameters: {}

